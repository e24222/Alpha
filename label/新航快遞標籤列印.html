<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>新航快遞 - 標籤列印工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "標楷體","DFKai-SB",serif; background: #e8e8d8; min-height: 100vh; }

/* ── 分頁 ── */
.tabs { display:flex; gap:0; background:#1a3c6e; padding:0 20px; }
.tab-btn {
  padding:12px 28px; font-size:15px; cursor:pointer;
  border:none; background:transparent; color:#aac4e8; font-family:sans-serif;
  border-bottom:3px solid transparent;
}
.tab-btn.active { color:#fff; border-bottom:3px solid #fff; font-weight:bold; }
.tab-btn:hover { color:#fff; }

.page { display:none; padding:20px; }
.page.active { display:block; }

/* ── 標籤列印頁 ── */
.controls {
  display:flex; align-items:center; justify-content:center;
  gap:14px; margin-bottom:16px; flex-wrap:wrap;
  font-family:sans-serif; font-size:13px;
}
.controls button {
  padding:8px 18px; font-size:14px; cursor:pointer;
  border-radius:5px; border:1px solid #999; background:#fff; font-family:sans-serif;
}
.controls button.primary { background:#1a5fa8; color:#fff; border-color:#1a5fa8; font-weight:bold; }
.controls button:hover { opacity:0.82; }
.og { display:flex; align-items:center; gap:5px; }
.og input[type=range] { width:80px; }
.og span { display:inline-block; width:42px; text-align:right; font-weight:bold; }

.sheet-wrap { display:flex; gap:12px; justify-content:center; flex-wrap:nowrap; }

.label-col { display:flex; flex-direction:column; align-items:center; gap:6px; }

/* 客戶編號輸入框 */
.cust-bar {
  display:flex; align-items:center; gap:6px;
  background:#fff; border:2px solid #1a5fa8; border-radius:5px;
  padding:5px 8px; width:262px; font-family:sans-serif;
}
.cust-bar label { font-size:12px; color:#1a5fa8; white-space:nowrap; }
.cust-bar input {
  flex:1; border:none; outline:none; font-size:14px;
  font-family:sans-serif; color:#111;
}
.cust-bar .cust-hint { font-size:11px; color:#888; min-width:60px; text-align:right; }

/* 標籤 */
.label { width:260px; border:2px solid #1a5fa8; background:#fff; display:flex; flex-direction:column; color:#1a5fa8; }
.label-title { text-align:center; font-size:16px; letter-spacing:5px; padding:5px 2px; border-bottom:1.5px solid #1a5fa8; font-weight:bold; }
.header-row { display:flex; border-bottom:1.5px solid #1a5fa8; }
.header-cell { flex:1; text-align:center; padding:3px 0; font-size:13px; letter-spacing:2px; }
.header-cell.sh { border-right:1.5px solid #1a5fa8; flex:0 0 75px; }
.body-row { display:flex; border-bottom:1.5px solid #1a5fa8; height:300px; }
.body-cell { flex:1; padding:4px; display:flex; }
.body-cell.sc { border-right:1.5px solid #1a5fa8; flex:0 0 75px; }
.body-cell textarea {
  width:100%; height:100%; border:none; outline:none; resize:none;
  font-family:"標楷體","DFKai-SB",serif; font-size:18px; color:#111; background:transparent;
  writing-mode:vertical-rl; line-height:1.8;
}
.footer-row { display:flex; border-bottom:1.5px solid #1a5fa8; min-height:50px; }
.footer-left { width:75px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1.5px solid #1a5fa8; padding:4px; font-size:13px; letter-spacing:2px; gap:3px; }
.footer-left input { width:48px; border:none; border-bottom:1.5px solid #1a5fa8; outline:none; text-align:center; font-family:"標楷體","DFKai-SB",serif; font-size:18px; color:#111; background:transparent; }
.footer-right { flex:1; padding:5px 8px; display:flex; flex-direction:column; justify-content:center; gap:4px; }
.footer-right .pl { font-size:13px; }
.footer-right input { width:100%; border:none; border-bottom:1.5px solid #1a5fa8; outline:none; font-family:"標楷體","DFKai-SB",serif; font-size:18px; color:#111; background:transparent; }
.station { text-align:center; font-size:12px; padding:4px 0; color:#1a5fa8; }
.copy-btn { display:block; width:100%; padding:4px 0; background:#e8f0fb; border:none; border-top:1px solid #1a5fa8; color:#1a5fa8; font-size:12px; cursor:pointer; font-family:sans-serif; }
.copy-btn:hover { background:#c8d8f8; }

/* ── 客戶管理頁 ── */
.mgmt-bar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  margin-bottom:14px; font-family:sans-serif;
}
.mgmt-bar input[type=text] {
  padding:7px 12px; font-size:14px; border:1px solid #aaa; border-radius:5px; outline:none; width:220px;
}
.mgmt-bar button {
  padding:7px 16px; font-size:14px; cursor:pointer;
  border-radius:5px; border:1px solid #999; background:#fff; font-family:sans-serif;
}
.mgmt-bar button.primary { background:#1a5fa8; color:#fff; border-color:#1a5fa8; }
.mgmt-bar button.danger  { background:#fff; color:#c00; border-color:#c00; }
.mgmt-bar button:hover { opacity:0.85; }

.cust-table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-family:sans-serif; font-size:14px; background:#fff; }
th { background:#1a3c6e; color:#fff; padding:10px 12px; text-align:left; white-space:nowrap; }
td { padding:9px 12px; border-bottom:1px solid #ddd; vertical-align:top; }
tr:hover td { background:#f0f6ff; }
tr.selected td { background:#ddeeff; }
td.actions { white-space:nowrap; }
td.actions button {
  padding:3px 10px; font-size:12px; cursor:pointer; border-radius:4px;
  border:1px solid #aaa; background:#fff; font-family:sans-serif; margin-right:4px;
}
td.actions button.del { border-color:#c00; color:#c00; }
td.actions button:hover { opacity:0.8; }

/* 編輯 Modal */
.modal-bg {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:#fff; border-radius:8px; padding:24px; width:420px; max-width:95vw;
  font-family:sans-serif; box-shadow:0 4px 24px rgba(0,0,0,0.2);
}
.modal h2 { font-size:16px; margin-bottom:16px; color:#1a3c6e; }
.modal label { display:block; font-size:13px; color:#444; margin-bottom:3px; margin-top:10px; }
.modal input, .modal textarea {
  width:100%; padding:7px 10px; font-size:14px;
  border:1px solid #bbb; border-radius:4px; outline:none; font-family:sans-serif;
}
.modal textarea { height:60px; resize:vertical; }
.modal .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.modal .modal-btns button {
  padding:8px 20px; font-size:14px; cursor:pointer;
  border-radius:5px; border:1px solid #999; background:#fff; font-family:sans-serif;
}
.modal .modal-btns button.primary { background:#1a5fa8; color:#fff; border-color:#1a5fa8; }

/* ── 列印 ── */
@media print {
  body { background:none; margin:0; padding:0; }
  .tabs, .controls, #preview-wrap, .sheet-wrap, .cust-bar, h1 { display:none !important; }
  @page { size: 274mm 140mm; margin: 0; }
  #print-area {
    display: block !important;
    position: relative; width: 274mm; height: 140mm;
  }
  #print-area .pf {
    position: absolute;
    font-family: "標楷體","DFKai-SB",serif;
    font-size: 13pt; color: #000; overflow: hidden;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  #print-area .pf.vert { writing-mode: vertical-rl; }
}
</style>
</head>

<script>
// ════════════ 分頁 ════════════
window.switchTab = function switchTab(tab) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b){
    if (b.textContent.includes(tab === 'print' ? '標籤' : '客戶')) b.classList.add('active');
  });
  if (tab === 'mgmt') renderTable();
}

// ════════════ Supabase REST API（不用 CDN library）════════════
var SUPA_URL = 'https://achrezfjtyjjgoyaaowr.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjaHJlemZqdHlqamdveWFhb3dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzgwMTgsImV4cCI6MjA5MjQ1NDAxOH0.pZtQzdp02UduK8R0Tm_PykA9hTsbCb7Z0Bmslg_rsrQ';

function supaFetch(path, options) {
  return fetch(SUPA_URL + '/rest/v1/' + path, Object.assign({
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    }
  }, options || {}));
}

var custCache = { AL: [], GM: [] };
var currentCompany = 'AL'; // 客戶管理目前選擇的公司

async function fetchCompany(co) {
  try {
    var res = await supaFetch('customers?company=eq.' + co + '&order=id');
    if (res.ok) custCache[co] = await res.json();
  } catch(e) { console.error('fetchCompany error:', e); }
}

async function fetchAllCustomers() {
  await Promise.all([fetchCompany('AL'), fetchCompany('GM')]);
}

window.switchCompany = function switchCompany(co) {
  currentCompany = co;
  document.getElementById('btn-co-AL').style.background = co === 'AL' ? '#1a5fa8' : '#e0e8f5';
  document.getElementById('btn-co-AL').style.color      = co === 'AL' ? '#fff'    : '#1a5fa8';
  document.getElementById('btn-co-GM').style.background = co === 'GM' ? '#1a5fa8' : '#e0e8f5';
  document.getElementById('btn-co-GM').style.color      = co === 'GM' ? '#fff'    : '#1a5fa8';
  document.getElementById('searchInput').value = '';
  renderTable();
}

// ID 正規化：英文字母轉大寫，純數字補到3碼
function normalizeId(raw) {
  var s = raw.trim().toUpperCase();
  if (/^\d+$/.test(s)) s = s.padStart(3, '0');
  return s;
}

function findCustomer(rawId, company) {
  var id = normalizeId(rawId);
  var list = custCache[company] || [];
  return list.find(function(c){ return c.id.toUpperCase() === id; });
}

async function saveModal() {
  var id    = normalizeId(document.getElementById('mId').value);
  var name  = document.getElementById('mName').value.trim();
  var addr  = document.getElementById('mAddr').value.trim();
  var sname = document.getElementById('mSname').value.trim() || '龍冶股份有限公司';
  var phone = document.getElementById('mPhone').value.trim();
  if (!id || !name) { alert('請填入客戶編號與收件人姓名'); return; }

  var list = custCache[currentCompany] || [];
  if (!editingId && list.some(function(c){ return c.id.toUpperCase() === id.toUpperCase(); })) {
    alert('客戶編號已存在'); return;
  }

  var rec = { company: currentCompany, id:id, name:name, addr:addr, sname:sname, phone:phone, updated_at: new Date().toISOString() };
  var res = await supaFetch('customers', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(rec)
  });
  if (!res.ok) { alert('儲存失敗：' + await res.text()); return; }

  await fetchCompany(currentCompany);
  closeModal();
  renderTable();
}

async function deleteCustomer(id) {
  if (!confirm('確定刪除客戶「' + id + '」？')) return;
  var res = await supaFetch('customers?company=eq.' + currentCompany + '&id=eq.' + encodeURIComponent(id), { method: 'DELETE' });

  custCache[currentCompany] = (custCache[currentCompany]||[]).filter(function(c){ return c.id !== id; });

}

async function importCSV(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = async function(ev) {
    var text = ev.target.result.replace(/^﻿/, ''); // 去 BOM
    var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if (lines.length < 2) { alert('CSV 格式錯誤或無資料'); return; }
    var imported = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = parseCSVLine(lines[i]);
      if (cols.length >= 3) {
        var rawId = cols[0] || '';
        var nId   = normalizeId(rawId);
        imported.push({
          id:    nId,
          name:  cols[1] || '',
          addr:  cols[2] || '',
          phone: cols[3] || ''
        });
      }
    }
    if (!imported.length) { alert('無法讀取任何資料，請確認格式：客戶編號,姓名,地址,電話'); return; }
    var snameDefault = currentCompany === 'AL' ? '龍冶股份有限公司' : '龍台貿易有限公司';
    imported.forEach(function(c){ c.company = currentCompany; if (!c.sname) c.sname = snameDefault; });
    var res = await supaFetch('customers', {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(imported)
    });
    if (!res.ok) { alert('匯入失敗：' + await res.text()); return; }
    await fetchCompany(currentCompany);
    renderTable();
    alert('匯入完成，共 ' + imported.length + ' 筆。');
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

window.clearAllCustomers = function clearAllCustomers() {

  saveCustomers([]);
  renderTable();
}

function parseCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else { inQ = !inQ; }
    } else if (ch === ',' && !inQ) {
      result.push(cur.trim()); cur = '';
    } else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

var SCALE = 3.0, SHEET_W = 274, SHEET_H = 140;
var canvas = document.getElementById('preview');
canvas.width  = Math.round(SHEET_W * SCALE);
canvas.height = Math.round(SHEET_H * SCALE);

function drawPreview() {
  var ctx = canvas.getContext('2d');
  var top  = parseInt(document.getElementById('sTop').value);
  var left = parseInt(document.getElementById('sLeft').value);
  var lw   = parseInt(document.getElementById('sLW').value);
  var gap  = parseInt(document.getElementById('sGap').value);
  var s    = SCALE;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#e8e4c8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  var fixedLeft = 5, senderW = 16;
  for (var i = 0; i < 4; i++) {
    var fx = (fixedLeft + i * (lw + gap)) * s;
    ctx.fillStyle = '#fff'; ctx.fillRect(fx, 0, lw*s, SHEET_H*s);
    ctx.strokeStyle = '#1a5fa8'; ctx.lineWidth = 1.5; ctx.strokeRect(fx, 0, lw*s, SHEET_H*s);
    ctx.fillStyle = '#ddeeff'; ctx.fillRect(fx, 0, lw*s, 11*s);
    ctx.strokeStyle = '#1a5fa8'; ctx.lineWidth = 0.5; ctx.strokeRect(fx, 0, lw*s, 11*s);
    ctx.fillStyle = '#1a5fa8'; ctx.font = 'bold ' + Math.round(8*s) + 'px serif';
    ctx.textAlign = 'center'; ctx.fillText('新航快遞', fx + lw*s/2, 8.5*s);
    ctx.fillStyle = '#eef4ff'; ctx.fillRect(fx, 11*s, lw*s, 6*s); ctx.strokeRect(fx, 11*s, lw*s, 6*s);
    ctx.beginPath(); ctx.moveTo(fx + senderW*s, 11*s); ctx.lineTo(fx + senderW*s, 17*s); ctx.stroke();
    ctx.fillStyle = '#1a5fa8'; ctx.font = Math.round(5.5*s) + 'px serif'; ctx.textAlign = 'center';
    ctx.fillText('寄件人', fx + senderW*s/2, 15.5*s);
    ctx.fillText('收件人', fx + (senderW + (lw-senderW)/2)*s, 15.5*s);
    ctx.strokeStyle = '#1a5fa8'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(fx + senderW*s, 17*s); ctx.lineTo(fx + senderW*s, 113*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx, 113*s); ctx.lineTo(fx + lw*s, 113*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx + senderW*s, 113*s); ctx.lineTo(fx + senderW*s, 130*s); ctx.stroke();
    ctx.fillStyle = '#1a5fa8'; ctx.font = Math.round(5*s) + 'px serif'; ctx.textAlign = 'center';
    ctx.fillText('共件', fx + senderW*s/2, 123*s);
    ctx.fillText('電話', fx + (senderW + (lw-senderW)/2)*s, 123*s);
    ctx.beginPath(); ctx.moveTo(fx, 130*s); ctx.lineTo(fx + lw*s, 130*s); ctx.stroke();
    ctx.font = Math.round(4.5*s) + 'px serif';
    ctx.fillText('中壢站：(03)451-8844', fx + lw*s/2, 137*s);
  }
  function drawVertical(ctx, text, x, y, maxH) {
    var charH = 7.5 * s, cx = x, cy = y + charH;
    text.split('').forEach(function(c) {
      ctx.fillText(c, cx, cy); cy += charH;
      if (cy > y + maxH) { cx -= charH; cy = y + charH; }
    });
  }
  var footOff2 = parseInt(document.getElementById('sFoot').value);
  var cntL2    = parseInt(document.getElementById('sCnt').value);
  var phnL2    = parseInt(document.getElementById('sPhn').value);
  for (var i = 0; i < 4; i++) {
    var n = i + 1, tx = (left + i * (lw + gap)) * s;
    var sVal = document.getElementById('sender-'+n).value;
    var rVal = document.getElementById('receiver-'+n).value;
    var cVal = document.getElementById('count-'+n).value;
    var pVal = document.getElementById('phone-'+n).value;
    ctx.font = Math.round(6*s) + 'px serif'; ctx.textAlign = 'left';
    if (sVal) { ctx.fillStyle = '#c00033'; drawVertical(ctx, sVal, tx + 1*s, top*s + 17*s, 86*s); }
    if (rVal) { ctx.fillStyle = '#c00033'; drawVertical(ctx, rVal, tx + (lw-8)*s, top*s + 17*s, 86*s); }
    if (cVal) { ctx.fillStyle = '#c00033'; ctx.fillText(cVal, tx + cntL2*s, top*s + (113+footOff2+8)*s); }
    if (pVal) { ctx.fillStyle = '#c00033'; ctx.fillText(pVal, tx + phnL2*s, top*s + (113+footOff2+8)*s); }
  }
}
