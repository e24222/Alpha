<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha 系統入口</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Microsoft JhengHei, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}
h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
p  { font-size: 1rem; opacity: 0.7; margin-bottom: 48px; }
.cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 36px 44px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  min-width: 200px;
}
.card:hover { background: rgba(255,255,255,0.18); transform: translateY(-4px); }
.card .icon { font-size: 3rem; margin-bottom: 16px; }
.card .name { font-size: 1.1rem; font-weight: 700; }
.card .desc { font-size: 0.85rem; opacity: 0.6; margin-top: 6px; }
</style>
</head>
<body>
  <h1>Alpha 系統</h1>
  <p>請選擇要使用的系統</p>
  <div class="cards">
    <a class="card" href="mold/index.html">
      <div class="icon">&#128295;</div>
      <div class="name">模具清冊管理</div>
      <div class="desc">模具資料管理與追蹤</div>
    </a>
    <a class="card" href="inspection/index.html">
      <div class="icon">&#128269;</div>
      <div class="name">首件檢驗記錄</div>
      <div class="desc">首件檢驗紀錄與查詢</div>
    </a>
  </div>
</body>
</html>
