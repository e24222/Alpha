<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍冶管理系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Microsoft JhengHei, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}
h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
p  { font-size: 1rem; opacity: 0.7; margin-bottom: 48px; }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 520px;
  max-width: 95vw;
}
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  cursor: pointer;
}
.card.full { grid-column: 1 / -1; }
.card:hover { background: rgba(255,255,255,0.18); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.card .icon { font-size: 2.8rem; margin-bottom: 14px; }
.card .name { font-size: 1.05rem; font-weight: 700; }
.card .desc { font-size: 0.82rem; opacity: 0.6; margin-top: 5px; }

/* Password Modal */
.pw-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.pw-box {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 36px 40px;
  text-align: center;
  min-width: 320px;
}
.pw-icon { font-size: 2.5rem; margin-bottom: 12px; }
.pw-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
.pw-sub { font-size: 0.85rem; opacity: 0.6; margin-bottom: 24px; }
.pw-input {
  width: 100%; padding: 10px 14px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: white;
  font-size: 1rem; text-align: center; letter-spacing: 4px;
  font-family: monospace; margin-bottom: 14px;
  outline: none;
}
.pw-input:focus { border-color: #60a5fa; }
.pw-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: #2563eb; color: white; border: none;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.pw-btn:hover { background: #1d4ed8; }
.pw-err { color: #f87171; font-size: 0.85rem; margin-top: 8px; display: none; }
</style>
</head>
<body>
  <h1>龍冶管理系統</h1>
  <p>請選擇要使用的系統</p>
  <div class="grid">
    <!-- 模具：獨佔一整行 -->
    <div class="card full" onclick="openSystem('模具清冊管理', 'mold/index.html')">
      <div class="icon">🔧</div>
      <div class="name">模具清冊管理</div>
      <div class="desc">模具資料管理與追蹤</div>
    </div>
    <!-- 標籤 + 送貨 -->
    <div class="card" onclick="openSystem('新航快遞標籤列印', 'label/新航快遞標籤列印.html')">
      <div class="icon">🏷️</div>
      <div class="name">新航快遞標籤列印</div>
      <div class="desc">標籤填寫與列印管理</div>
    </div>
    <div class="card" onclick="openSystem('送貨路線規劃', 'delivery/送貨路線規劃.html')">
      <div class="icon">🚛</div>
      <div class="name">送貨路線規劃</div>
      <div class="desc">路線規劃與導航列印</div>
    </div>
    <!-- 客訴 + 首件 -->
    <div class="card" onclick="openSystem('客訴管理系統', 'complaint/index.html')">
      <div class="icon">📋</div>
      <div class="name">客訴管理系統</div>
      <div class="desc">客訴記錄與追蹤管理</div>
    </div>
    <a class="card" href="inspection/index.html">
      <div class="icon">🔍</div>
      <div class="name">首件檢驗記錄</div>
      <div class="desc">首件檢驗紀錄與查詢</div>
    </a>
  </div>

  <!-- Password Modal -->
  <div class="pw-overlay" id="pwModal" style="display:none">
    <div class="pw-box">
      <div class="pw-icon">🔒</div>
      <div class="pw-title" id="pwTitle"></div>
      <div class="pw-sub">請輸入密碼以繼續</div>
      <input class="pw-input" type="password" id="pwInput" placeholder="請輸入密碼"
        onkeydown="if(event.key==='Enter')checkPw()">
      <button class="pw-btn" onclick="checkPw()">進入系統</button>
      <div class="pw-err" id="pwErr">密碼錯誤，請重試</div>
      <div style="margin-top:14px">
        <button onclick="document.getElementById('pwModal').style.display='none'"
          style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.85rem">取消</button>
      </div>
    </div>
  </div>

<script>
const CORRECT = '22505047';
const PW_TTL  = 24 * 60 * 60 * 1000; // 24 小時
let pwTargetUrl = '';

function isAuthed() {
  const t = localStorage.getItem('auth_time');
  return t && (Date.now() - parseInt(t)) < PW_TTL;
}
function setAuthed() { localStorage.setItem('auth_time', String(Date.now())); }

function openSystem(title, url) {
  if (isAuthed()) { window.location.href = url; return; }
  pwTargetUrl = url;
  document.getElementById('pwTitle').textContent = title;
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').style.display = 'none';
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}

function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (v === CORRECT) {
    setAuthed();
    window.location.href = pwTargetUrl;
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
