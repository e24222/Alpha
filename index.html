<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍冶管理系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Microsoft JhengHei, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
}
h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
p  { font-size: 1rem; opacity: 0.7; margin-bottom: 48px; }
.cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 36px 44px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  min-width: 200px;
  cursor: pointer;
}
.card:hover { background: rgba(255,255,255,0.18); transform: translateY(-4px); }
.card .icon { font-size: 3rem; margin-bottom: 16px; }
.card .name { font-size: 1.1rem; font-weight: 700; }
.card .desc { font-size: 0.85rem; opacity: 0.6; margin-top: 6px; }

/* Password Modal */
.pw-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.pw-box {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 36px 40px;
  text-align: center;
  min-width: 320px;
}
.pw-icon { font-size: 2.5rem; margin-bottom: 12px; }
.pw-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
.pw-sub { font-size: 0.85rem; opacity: 0.6; margin-bottom: 24px; }
.pw-input {
  width: 100%; padding: 10px 14px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: white;
  font-size: 1rem; text-align: center; letter-spacing: 4px;
  font-family: monospace; margin-bottom: 14px;
  outline: none;
}
.pw-input:focus { border-color: #60a5fa; }
.pw-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: #2563eb; color: white; border: none;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.pw-btn:hover { background: #1d4ed8; }
.pw-err { color: #f87171; font-size: 0.85rem; margin-top: 8px; display: none; }
</style>
</head>
<body>
  <h1>龍冶管理系統</h1>
  <p>請選擇要使用的系統</p>
  <div class="cards">
    <a class="card" href="mold/index.html">
      <div class="icon">🔧</div>
      <div class="name">模具清冊管理</div>
      <div class="desc">模具資料管理與追蹤</div>
    </a>
    <a class="card" href="inspection/index.html">
      <div class="icon">🔍</div>
      <div class="name">首件檢驗記錄</div>
      <div class="desc">首件檢驗紀錄與查詢</div>
    </a>
    <a class="card" href="新航標籤系統/新航快遞標籤列印.html">
      <div class="icon">🏷️</div>
      <div class="name">新航快遞標籤列印</div>
      <div class="desc">標籤填寫與列印管理</div>
    </a>
    <div class="card" onclick="openDelivery()">
      <div class="icon">🚛</div>
      <div class="name">送貨路線規劃</div>
      <div class="desc">路線規劃與導航列印</div>
    </div>
    <div class="card" onclick="openComplaint()">
      <div class="icon">📋</div>
      <div class="name">客訴管理系統</div>
      <div class="desc">客訴記錄與追蹤管理</div>
    </div>
  </div>

  <!-- Password Modal for Complaint System -->
  <div class="pw-overlay" id="pwModal" style="display:none">
    <div class="pw-box">
      <div class="pw-icon">🔒</div>
      <div class="pw-title" id="pwTitle">客訴管理系統</div>
      <div class="pw-sub">請輸入密碼以繼續</div>
      <input class="pw-input" type="password" id="pwInput" placeholder="請輸入密碼"
        onkeydown="if(event.key==='Enter')checkPw()">
      <button class="pw-btn" onclick="checkPw()">進入系統</button>
      <div class="pw-err" id="pwErr">密碼錯誤，請重試</div>
      <div style="margin-top:14px">
        <button onclick="document.getElementById('pwModal').style.display='none'"
          style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.85rem">取消</button>
      </div>
    </div>
  </div>

<script>
const CORRECT = '22505047';
const PW_TTL = 5 * 60 * 1000; // 5 分鐘有效
let pwTarget = '';
function isAuthed() {
  const t = sessionStorage.getItem('auth_time');
  return t && (Date.now() - parseInt(t)) < PW_TTL;
}
function setAuthed() { sessionStorage.setItem('auth_time', Date.now()); }
function openComplaint() {
  if (isAuthed()) { window.location.href = 'complaint/index.html?a=1'; return; }
  pwTarget = 'complaint';
  document.getElementById('pwTitle').textContent = '客訴管理系統';
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').style.display = 'none';
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function openDelivery() {
  if (isAuthed()) { window.location.href = 'delivery/送貨路線規劃.html'; return; }
  pwTarget = 'delivery';
  document.getElementById('pwTitle').textContent = '送貨路線規劃';
  document.getElementById('pwModal').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').style.display = 'none';
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (v === CORRECT) {
    setAuthed();
    if (pwTarget === 'delivery') {
      window.location.href = 'delivery/送貨路線規劃.html';
    } else {
      sessionStorage.setItem('complaint_auth', '1');
      window.location.href = 'complaint/index.html?a=1';
    }
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</ht
