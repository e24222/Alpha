<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍冶管理系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%;
  font-family: Microsoft JhengHei, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px;
}
h1 { font-size: 1.8rem; font-weight: 800; }
p  { font-size: 0.9rem; opacity: 0.6; margin-top: 4px; }
.header { text-align: center; margin-bottom: 8px; }

.row { display: flex; gap: 16px; justify-content: center; width: 100%; }

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 24px 20px;
  text-align: center;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
  cursor: pointer;
  width: 160px;
  min-width: 0;
}
@media (min-width: 500px) { .card { width: 220px; padding: 24px 32px; } }
.card:hover {
  background: rgba(255,255,255,0.18);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card .icon { font-size: 2.2rem; margin-bottom: 10px; }
.card .name { font-size: 1rem; font-weight: 700; }
.card .desc { font-size: 0.78rem; opacity: 0.55; margin-top: 4px; }

/* Password Modal */
.pw-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.pw-box {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 36px 40px;
  text-align: center;
  min-width: 300px;
}
.pw-icon { font-size: 2rem; margin-bottom: 10px; }
.pw-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
.pw-sub { font-size: 0.82rem; opacity: 0.6; margin-bottom: 20px; }
.pw-input {
  width: 100%; padding: 10px 14px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: white;
  font-size: 1rem; text-align: center; letter-spacing: 4px;
  font-family: monospace; margin-bottom: 12px; outline: none;
}
.pw-input:focus { border-color: #60a5fa; }
.pw-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: #2563eb; color: white; border: none;
  font-size: 1rem; font-weight: 600; cursor: pointer;
}
.pw-btn:hover { background: #1d4ed8; }
.pw-err { color: #f87171; font-size: 0.82rem; margin-top: 8px; display: none; }
.pw-cancel {
  margin-top: 12px; background: none; border: none;
  color: rgba(255,255,255,0.45); cursor: pointer; font-size: 0.82rem;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>龍冶管理系統</h1>
    <p>請選擇要使用的系統</p>
  </div>

  <!-- 第一排：模具 -->
  <div class="row">
    <div class="card" onclick="openSystem('模具清冊管理', 'mold/index.html')">
      <div class="icon">🔧</div>
      <div class="name">模具清冊管理</div>
      <div class="desc">模具資料管理與追蹤</div>
    </div>
  </div>

  <!-- 第二排：標籤 + 送貨 -->
  <div class="row">
    <div class="card" onclick="openSystem('新航快遞標籤列印', 'label/index.html')">
      <div class="icon">🏷️</div>
      <div class="name">新航快遞標籤列印</div>
      <div class="desc">標籤填寫與列印管理</div>
    </div>
    <div class="card" onclick="openSystem('送貨路線規劃', 'delivery/index.html')">
      <div class="icon">🚛</div>
      <div class="name">送貨路線規劃</div>
      <div class="desc">路線規劃與導航列印</div>
    </div>
  </div>

  <!-- 第三排：客訴 + 首件 -->
  <div class="row">
    <div class="card" onclick="openSystem('客訴管理系統', 'complaint/index.html')">
      <div class="icon">📋</div>
      <div class="name">客訴管理系統</div>
      <div class="desc">客訴記錄與追蹤管理</div>
    </div>
    <a class="card" href="inspection/index.html">
      <div class="icon">🔍</div>
      <div class="name">首件檢驗記錄</div>
      <div class="desc">首件檢驗紀錄與查詢</div>
    </a>
  </div>
</div>

<script>
function openSystem(title, url) {
  window.location.href = url;
}
</script>
</body>
</html>
